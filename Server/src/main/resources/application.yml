spring:
  application:
    name: car-dealership-inventory

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.dealership.inventory: DEBUG
