spring:
  datasource:
    url: jdbc:h2:mem:dealership_inventory_test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-and-integration-tests-only
    expiration-ms: 3600000
